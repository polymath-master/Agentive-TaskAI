name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1
        validate-wrappers: false

    - name: Configure Environment Secrets (.env)
      run: |
        if [ -f .env.example ]; then
          echo "Copying .env.example to .env..."
          cp .env.example .env
        else
          echo "No .env.example found, creating a default empty .env file..."
          touch .env
        fi

    - name: Restore Debug Keystore
      env:
        DEBUG_KEYSTORE_SECRET: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$DEBUG_KEYSTORE_SECRET" ]; then
          echo "$DEBUG_KEYSTORE_SECRET" | base64 -d > debug.keystore
          echo "Debug keystore successfully restored from GitHub Secret."
        elif [ -f "debug.keystore.base64" ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug keystore successfully restored from debug.keystore.base64 file."
        else
          echo "WARNING: Neither DEBUG_KEYSTORE_BASE64 secret nor debug.keystore.base64 file found."
          echo "Generating a temporary debug keystore for compile check (Warning: SHA-1 signature will differ)..."
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Run Unit Tests
      run: gradle testDebugUnitTest --no-daemon

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
